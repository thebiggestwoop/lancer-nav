<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lancer Companion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Lancer Companion</h1>
    <p id="global-status" class="status"></p>
  </header>

  <details id="settings-details">
    <summary>Settings</summary>
    <div class="field">
      <label for="pairing-code">Pairing code</label>
      <input id="pairing-code" type="text" placeholder="from l!link in Discord" />
    </div>
    <button id="save-settings">Save</button>
    <p id="settings-status" class="status"></p>
  </details>

  <section class="card">
    <h2>Roll History</h2>
    <ul id="roll-history" class="roll-history"></ul>
  </section>

  <section class="card">
    <h2>d20</h2>
    <div class="row d20-controls-row">
      <div class="stat-group">
        <label for="check-modifier">Modifier</label>
        <div class="modifier-control">
          <button id="check-modifier-minus" class="step-btn" type="button" aria-label="Decrease Modifier">&minus;</button>
          <input id="check-modifier" type="text" inputmode="numeric" value="+0" class="modifier-input" />
          <button id="check-modifier-plus" class="step-btn" type="button" aria-label="Increase Modifier">+</button>
        </div>
      </div>
      <div class="stat-group">
        <label for="check-accuracy">Accuracy</label>
        <div class="tally-control">
          <button id="check-accuracy-add" class="tally-btn" type="button" aria-label="Add Accuracy">
            <svg viewBox="0 0 100 100" class="tally-icon" aria-hidden="true">
              <polygon points="90,50 70,84.64 30,84.64 10,50 30,15.36 70,15.36" fill="none" stroke="currentColor" stroke-width="8" stroke-linejoin="round"/>
              <rect x="42" y="28" width="16" height="44" fill="currentColor"/>
              <rect x="28" y="42" width="44" height="16" fill="currentColor"/>
            </svg>
          </button>
          <input id="check-accuracy" type="number" value="0" min="0" step="1" class="tally-input" />
        </div>
      </div>
      <div class="stat-group">
        <label for="check-difficulty">Difficulty</label>
        <div class="tally-control">
          <button id="check-difficulty-add" class="tally-btn" type="button" aria-label="Add Difficulty">
            <svg viewBox="0 0 100 100" class="tally-icon" aria-hidden="true">
              <polygon points="90,50 70,84.64 30,84.64 10,50 30,15.36 70,15.36" fill="none" stroke="currentColor" stroke-width="8" stroke-linejoin="round"/>
              <rect x="28" y="42" width="44" height="16" fill="currentColor"/>
            </svg>
          </button>
          <input id="check-difficulty" type="number" value="0" min="0" step="1" class="tally-input" />
        </div>
      </div>
    </div>
    <button id="check-roll-btn" class="btn-primary">Roll d20</button>
  </section>

  <section class="card">
    <h2>XdX</h2>
    <div class="row xdx-controls-row">
      <div class="stat-group">
        <label for="damage-d6">d6</label>
        <div class="dice-stepper">
          <input id="damage-d6" type="text" inputmode="numeric" value="" placeholder="0" class="modifier-input dice-input" />
          <div class="stepper-stack">
            <button id="damage-d6-add" class="stack-btn stack-btn-plus" type="button" aria-label="Increase d6">+</button>
            <button id="damage-d6-minus" class="stack-btn stack-btn-minus" type="button" aria-label="Decrease d6">&minus;</button>
          </div>
        </div>
      </div>
      <div class="stat-group">
        <label for="damage-d3">d3</label>
        <div class="dice-stepper">
          <input id="damage-d3" type="text" inputmode="numeric" value="" placeholder="0" class="modifier-input dice-input" />
          <div class="stepper-stack">
            <button id="damage-d3-add" class="stack-btn stack-btn-plus" type="button" aria-label="Increase d3">+</button>
            <button id="damage-d3-minus" class="stack-btn stack-btn-minus" type="button" aria-label="Decrease d3">&minus;</button>
          </div>
        </div>
      </div>
      <div class="stat-group">
        <label for="damage-flat">Flat</label>
        <div class="modifier-control">
          <button id="damage-flat-minus" class="step-btn" type="button" aria-label="Decrease Flat">&minus;</button>
          <input id="damage-flat" type="text" inputmode="numeric" value="+0" class="modifier-input" />
          <button id="damage-flat-plus" class="step-btn" type="button" aria-label="Increase Flat">+</button>
        </div>
      </div>
    </div>
    <div class="row keep-crit-row">
      <div class="keep-field">
        <label>Keep</label>
        <div class="keep-toggle" role="group" aria-label="Keep">
          <button id="damage-keep-all" class="keep-btn active" type="button" data-keep="">All</button>
          <button id="damage-keep-high" class="keep-btn" type="button" data-keep="h">High</button>
          <button id="damage-keep-low" class="keep-btn" type="button" data-keep="l">Low</button>
        </div>
      </div>
      <label class="checkbox-field">
        <input id="damage-crit" type="checkbox" />
        Crit
      </label>
    </div>
    <div class="row d2-row">
      <button id="damage-d2-btn" class="quick-die-btn" type="button">d2</button>
      <button id="damage-roll-btn" class="btn-primary">Roll</button>
    </div>
  </section>

  <details id="advanced-details">
    <summary>Advanced: type an expression</summary>
    <div class="field">
      <label for="roll-expression">Expression</label>
      <input id="roll-expression" type="text" placeholder="d20 + 3 a2   or   2d6 + 3 crit" />
    </div>
    <button id="roll-btn">Roll</button>
  </details>

  <div class="reset-row">
    <button id="reset-all-btn" class="reset-btn" type="button">Reset All</button>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
